<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini HTML Emulator</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      display: flex;
      height: 100vh;
    }

    .editor, .preview {
      width: 50%;
      height: 100%;
      box-sizing: border-box;
    }

    .editor {
      padding: 10px;
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      width: 100%;
      resize: none;
      font-family: monospace;
      font-size: 14px;
      padding: 8px;
      box-sizing: border-box;
    }

    .controls {
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="editor">
    <div class="controls">
      <span>HTML Emulator</span>
      <button id="runBtn">Run</button>
    </div>
    <textarea id="code">
<!DOCTYPE html>
<html>
  <head>
    <title>Test Page</title>
  </head>
  <body>
    <h1>Hello, world!</h1>
    <p>Edit this HTML and click "Run".</p>
  </body>
</html>
    </textarea>
  </div>

  <div class="preview">
    <iframe id="previewFrame"></iframe>
  </div>

  <script>
    const textarea = document.getElementById('code');
    const iframe = document.getElementById('previewFrame');
    const runBtn = document.getElementById('runBtn');

    function runCode() {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(textarea.value);
      doc.close();
    }

    runBtn.addEventListener('click', runCode);

    // Optional: live update as you type
    // textarea.addEventListener('input', runCode);

    // Run once on load
    runCode();
  </script>
</body>
</html>
