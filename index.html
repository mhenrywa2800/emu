<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HTML Emulator with Closable Code Tab</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0.5rem 1rem;
      background: #111827;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
    }

    header button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      display: none; /* shown when code tab is closed */
    }

    header button:hover {
      background: #1d4ed8;
    }

    .container {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .code-pane {
      width: 40%;
      min-width: 220px;
      max-width: 60%;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      background: #f9fafb;
      transition: width 0.25s ease, opacity 0.2s ease;
    }

    .code-pane-header {
      padding: 0.4rem 0.75rem;
      background: #111827;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    .code-pane-header span {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .tab-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #f97316;
    }

    .close-tab-btn {
      background: transparent;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 0.25rem;
    }

    .close-tab-btn:hover {
      color: #f87171;
    }

    textarea {
      flex: 1;
      border: none;
      resize: none;
      padding: 0.75rem;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
      background: #f3f4f6;
      color: #111827;
      outline: none;
    }

    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      padding: 0.4rem 0.75rem;
      background: #111827;
      color: #e5e7eb;
      font-size: 0.85rem;
    }

    iframe {
      flex: 1;
      border: none;
      background: white;
    }

    /* When code pane is hidden */
    .code-pane.hidden {
      width: 0;
      opacity: 0;
      pointer-events: none;
    }

    .code-pane.hidden textarea {
      display: none;
    }

    .code-pane.hidden .code-pane-header {
      display: none;
    }

    @media (max-width: 700px) {
      .container {
        flex-direction: column;
      }
      .code-pane {
        width: 100%;
        max-width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
      }
      .code-pane.hidden {
        height: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>HTML Emulator</h1>
    <button id="reopenTabBtn">Reopen Code Tab</button>
  </header>

  <div class="container">
    <div class="code-pane" id="codePane">
      <div class="code-pane-header">
        <span>
          <span class="tab-dot"></span>
          editor.html
        </span>
        <button class="close-tab-btn" id="closeTabBtn" title="Close code tab">✕</button>
      </div>
      <textarea id="codeInput">
<!DOCTYPE html>
<html>
  <head>
    <title>Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        padding: 1.5rem 2rem;
        border-radius: 0.75rem;
        background: #111827;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
      }
      .card h1 {
        margin: 0 0 0.5rem;
        font-size: 1.4rem;
      }
      .card p {
        margin: 0;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello from the emulator 👋</h1>
      <p>Edit the code on the left and it will update here.</p>
    </div>
  </body>
</html>
      </textarea>
    </div>

    <div class="preview-pane">
      <div class="preview-header">Preview</div>
      <iframe id="previewFrame"></iframe>
    </div>
  </div>

  <script>
    const codeInput = document.getElementById("codeInput");
    const previewFrame = document.getElementById("previewFrame");
    const closeTabBtn = document.getElementById("closeTabBtn");
    const reopenTabBtn = document.getElementById("reopenTabBtn");
    const codePane = document.getElementById("codePane");

    function updatePreview() {
      const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      doc.open();
      doc.write(codeInput.value);
      doc.close();
    }

    // Live update on input
    codeInput.addEventListener("input", updatePreview);

    // Initial load
    updatePreview();

    // Close the code tab
    closeTabBtn.addEventListener("click", () => {
      codePane.classList.add("hidden");
      reopenTabBtn.style.display = "inline-flex";
    });

    // Reopen the code tab
    reopenTabBtn.addEventListener("click", () => {
      codePane.classList.remove("hidden");
      reopenTabBtn.style.display = "none";
    });
  </script>
</body>
</html>
